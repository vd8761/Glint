<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glint - Certificate Issuance & Verification Platform</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas-pro@2.2.0/dist/html2canvas-pro.min.js"></script>
    <script>
      // Map global jsPDF from UMD namespace
      window.jsPDF = window.jspdf ? window.jspdf.jsPDF : window.jsPDF;
      // Map global html2canvas from html2canvas-pro UMD namespace
      if (window.html2canvas && window.html2canvas.default) {
        window.html2canvas = window.html2canvas.default;
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.min.js"></script>
  </head>
